<div class="post-wrapper">
  <div class="post-card">
    <div class="post-header">
      <div class="post-user">
        <img
          class="profile-image"
          [src]="profileImage"
          [alt]="username + ' profile picture'"
        />
        <div class="post-user-info">
          <span class="username">{{ username }}</span>
          <span class="location" *ngIf="location">
            {{ location }}
          </span>
        </div>
      </div>

      <button
        type="button"
        class="menu-button"
        aria-label="Post options"
      >
        ...
      </button>
    </div>

    <img
      class="post-image"
      [src]="postImage"
      [alt]="'Post by ' + username"
    />

    <div class="post-content">
      <app-action-bar
        [liked]="liked"
        (likedChange)="onLikedChange($event)"
        (commentClicked)="openComments()"
        (shareClicked)="openShare()"
      ></app-action-bar>

      <p class="post-likes">
        <strong>{{ likes }} likes</strong>
      </p>

      <p class="post-caption">
        <strong>{{ username }}</strong> {{ caption }}
      </p>
    </div>
  </div>

  <!-- Dark overlay for comments -->
  <div
    class="comments-overlay"
    *ngIf="isCommentsOpen"
    (click)="closeComments()"
  ></div>

  <!-- Comments sheet -->
  <div
    class="comments-sheet"
    *ngIf="isCommentsOpen"
    (click)="$event.stopPropagation()"
  >
    <div class="comments-handle"></div>

    <div class="comments-header">
      <span>Comments</span>
    </div>

    <div class="comments-list">
      <div class="comment" *ngFor="let comment of comments">
        <img
          class="comment-profile-image"
          [src]="comment.profileImage"
          [alt]="comment.username + ' profile picture'"
        />

        <div class="comment-body">
          <span class="comment-text">
            <strong class="comment-username">
              {{ comment.username }}
            </strong>
            {{ comment.text }}
          </span>
        </div>

        <div class="comment-like">
          <app-like-button
            [liked]="comment.liked"
            (likedChange)="comment.liked = $event"
          ></app-like-button>
        </div>
      </div>
    </div>
  </div>
  <div
    class="comments-overlay"
    *ngIf="isShareOpen"
    (click)="closeShare()"
  ></div>

  <div
    class="comments-sheet share-sheet"
    *ngIf="isShareOpen"
    (click)="$event.stopPropagation()"
  >
    <div class="comments-handle"></div>

    <div class="comments-header">
      <span>Share</span>
    </div>

    <div class="share-search">
      <input
        type="text"
        class="share-search-input"
        placeholder="Search"
        [value]="shareSearch"
        (input)="onShareSearch($event)"
      />
      <button
        type="button"
        class="share-search-button"
        aria-label="Search recipients"
      >
        Search
      </button>
    </div>

    <div class="share-recipient-list">
      <div class="share-recipient" *ngFor="let recipient of filteredShareRecipients">
        <img
          class="comment-profile-image"
          [src]="recipient.profileImage"
          [alt]="recipient.username + ' profile picture'"
        />

        <div class="comment-body">
          <div class="share-recipient-name">{{ recipient.username }}</div>
          <div class="share-recipient-meta">{{ recipient.fullName }}</div>
        </div>

        <button
          type="button"
          class="share-send-button"
        >
          Send
        </button>
      </div>

      <p class="share-empty-state" *ngIf="filteredShareRecipients.length === 0">
        No people found.
      </p>
    </div>

    <div class="share-options-row">
      <button
        type="button"
        class="share-option-card"
        *ngFor="let option of shareOptions"
      >
        <span class="share-option-icon">{{ option.icon }}</span>
        <span class="share-option-label">{{ option.label }}</span>
      </button>
    </div>
  </div>
</div>
