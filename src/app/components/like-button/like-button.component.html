<div class="like-container">
    <button 
        type="button"
        class="like-button"
        (click)="toggleLike()"
        [attr.aria-label]="liked ? 'Unlike post' : 'Like post'"
        [attr.aria-pressed]="liked"
        >
        <span aria-hidden="true">{{ liked ? '❤️' : '🤍' }}</span>
    </button>
</div>
